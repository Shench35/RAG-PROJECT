<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ORBITAL — OTP Verification</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #050810;
      --surface:   #0a0f1e;
      --panel:     #0d1526;
      --border:    #1a2a4a;
      --accent:    #00d4ff;
      --accent2:   #ff4500;
      --green:     #00ff88;
      --muted:     #3a5070;
      --text:      #c8dff0;
      --text-dim:  #5a7a9a;
      --font-mono: 'Share Tech Mono', monospace;
      --font-head: 'Orbitron', sans-serif;
      --font-body: 'Exo 2', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    canvas#stars {
      position: fixed; inset: 0;
      z-index: 0; pointer-events: none;
    }

    .grid-overlay {
      position: fixed; inset: 0; z-index: 1;
      background-image:
        linear-gradient(rgba(0,212,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .scanline {
      position: fixed; top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: .25; z-index: 2;
      animation: scan 6s linear infinite;
    }
    @keyframes scan { 0% { top: 0; } 100% { top: 100vh; } }

    .card {
      position: relative; z-index: 10;
      width: min(460px, 92vw);
      background: var(--surface);
      border: 1px solid var(--border);
      clip-path: polygon(0 0, calc(100% - 28px) 0, 100% 28px, 100% 100%, 28px 100%, 0 calc(100% - 28px));
      animation: fadeUp .7s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card::before, .card::after {
      content: ''; position: absolute;
      width: 16px; height: 16px;
    }
    .card::before {
      top: 7px; right: 7px;
      border-top: 1px solid var(--accent);
      border-right: 1px solid var(--accent);
    }
    .card::after {
      bottom: 7px; left: 7px;
      border-bottom: 1px solid var(--accent);
      border-left: 1px solid var(--accent);
    }

    .top-bar {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 14px 28px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }
    .brand {
      font-family: var(--font-head);
      font-size: 13px; font-weight: 900;
      color: #fff; letter-spacing: 2px;
    }
    .brand span { color: var(--accent); }
    .status-pill {
      display: flex; align-items: center; gap: 6px;
      font-family: var(--font-mono);
      font-size: 9px; color: var(--green); letter-spacing: 2px;
    }
    .status-pill::before {
      content: ''; width: 6px; height: 6px; border-radius: 50%;
      background: var(--green);
      animation: blink 1.5s ease-in-out infinite;
    }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: .2; } }

    .card-body { padding: 44px 44px 40px; }

    .eyebrow {
      font-family: var(--font-mono);
      font-size: 9px; color: var(--accent);
      letter-spacing: 4px; margin-bottom: 8px;
    }
    h1 {
      font-family: var(--font-head);
      font-size: 20px; font-weight: 900;
      color: #fff; margin-bottom: 10px;
    }
    .subtitle {
      font-family: var(--font-mono);
      font-size: 11px; color: var(--text-dim);
      line-height: 1.7; margin-bottom: 36px;
    }
    .subtitle strong { color: var(--accent); }

    .form-group {
      display: flex; flex-direction: column; gap: 7px;
      margin-bottom: 28px;
    }
    label {
      font-family: var(--font-mono);
      font-size: 9px; letter-spacing: 3px;
      color: var(--text-dim); text-transform: uppercase;
    }
    .input-wrap { position: relative; }
    .input-wrap .icon {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted); font-size: 13px; pointer-events: none;
    }
    .input-wrap input {
      width: 100%;
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 12px;
      padding: 11px 14px 11px 38px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .input-wrap input::placeholder { color: var(--muted); }
    .input-wrap input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent), inset 0 0 12px rgba(0,212,255,.05);
    }

    .otp-label {
      font-family: var(--font-mono);
      font-size: 9px; letter-spacing: 3px;
      color: var(--text-dim); text-transform: uppercase;
      margin-bottom: 12px;
    }
    .otp-boxes {
      display: flex; gap: 8px;
      justify-content: center;
      margin-bottom: 10px;
    }
    .otp-box {
      width: 52px; height: 60px;
      background: transparent;
      border: none;
      border-bottom: 2px solid var(--muted);
      color: var(--accent);
      font-family: var(--font-head);
      font-size: 28px; font-weight: 700;
      text-align: center; outline: none;
      transition: border-color .2s, color .2s;
      caret-color: transparent;
    }
    .otp-box:focus {
      border-bottom-color: var(--accent);
      color: #fff;
    }
    .otp-box.filled {
      border-bottom-color: var(--accent);
      color: var(--accent);
    }
    .otp-box.error-box {
      border-bottom-color: var(--accent2);
      color: var(--accent2);
      animation: shake .3s ease;
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-5px); }
      75%      { transform: translateX(5px); }
    }

    .timer-row {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-bottom: 24px; margin-top: 8px;
    }
    .timer {
      font-family: var(--font-mono);
      font-size: 10px; color: var(--text-dim);
    }
    .timer strong { color: var(--accent); }
    .timer.expiring strong { color: var(--accent2); }
    .resend-btn {
      font-family: var(--font-mono);
      font-size: 10px; color: var(--text-dim);
      background: none; border: none;
      cursor: pointer; letter-spacing: 1px;
      transition: color .2s;
    }
    .resend-btn:not(:disabled):hover { color: var(--accent); }
    .resend-btn:disabled { opacity: .4; cursor: not-allowed; }

    .error-msg {
      font-family: var(--font-mono);
      font-size: 10px; color: var(--accent2);
      min-height: 16px; margin-bottom: 16px;
      letter-spacing: 1px;
    }

    .btn-launch {
      width: 100%;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: var(--font-head);
      font-size: 12px; font-weight: 700;
      letter-spacing: 4px; text-transform: uppercase;
      padding: 15px; cursor: pointer;
      position: relative; overflow: hidden;
      transition: color .3s;
      clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
      margin-bottom: 20px;
    }
    .btn-launch::before {
      content: ''; position: absolute; inset: 0;
      background: var(--accent);
      transform: translateX(-101%);
      transition: transform .35s ease; z-index: 0;
    }
    .btn-launch:hover::before { transform: translateX(0); }
    .btn-launch:hover { color: var(--bg); }
    .btn-launch span { position: relative; z-index: 1; }
    .btn-launch:disabled { opacity: .4; cursor: not-allowed; }

    .login-link {
      text-align: center;
      font-family: var(--font-mono);
      font-size: 10px; color: var(--text-dim);
    }
    .login-link a { color: var(--accent); text-decoration: none; }

    .toast {
      position: fixed; bottom: 32px; right: 32px;
      padding: 14px 20px;
      font-family: var(--font-mono); font-size: 11px;
      border-left: 3px solid var(--green);
      background: var(--panel); color: var(--green);
      opacity: 0; transform: translateY(10px);
      transition: opacity .3s, transform .3s;
      z-index: 100; pointer-events: none;
    }
    .toast.error { border-color: var(--accent2); color: var(--accent2); }
    .toast.show  { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>

<canvas id="stars"></canvas>
<div class="grid-overlay"></div>
<div class="scanline"></div>

<div class="card">
  <div class="top-bar">
    <div class="brand">ORBI<span>TAL</span></div>
    <div class="status-pill">OTP TERMINAL</div>
  </div>

  <div class="card-body">
    <div class="eyebrow">// Identity Verification</div>
    <h1>ENTER ACCESS CODE</h1>
    <p class="subtitle">
      A 6-digit verification code was sent to<br>
      <strong id="emailDisplay">your registered email</strong>.
    </p>

    <div class="form-group">
      <label for="emailInput">Email Address</label>
      <div class="input-wrap">
        <span class="icon">@</span>
        <input type="email" id="emailInput" placeholder="crew@orbital.space" />
      </div>
    </div>

    <div class="otp-label">Verification Code</div>
    <div class="otp-boxes">
      <input class="otp-box" type="text" maxlength="1" inputmode="numeric" id="o1" />
      <input class="otp-box" type="text" maxlength="1" inputmode="numeric" id="o2" />
      <input class="otp-box" type="text" maxlength="1" inputmode="numeric" id="o3" />
      <input class="otp-box" type="text" maxlength="1" inputmode="numeric" id="o4" />
      <input class="otp-box" type="text" maxlength="1" inputmode="numeric" id="o5" />
      <input class="otp-box" type="text" maxlength="1" inputmode="numeric" id="o6" />
    </div>

    <div class="timer-row">
      <div class="timer" id="timerDisplay">
        Expires in <strong id="timerCount">10:00</strong>
      </div>
      <button class="resend-btn" id="resendBtn" disabled>RESEND CODE</button>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <button class="btn-launch" id="submitBtn">
      <span id="btnText">VERIFY IDENTITY</span>
    </button>

    <div class="login-link">
      Wrong account? <a href="login.html">Sign in instead →</a>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  /* STARFIELD */
  const canvas = document.getElementById('stars');
  const ctx    = canvas.getContext('2d');
  let stars    = [];
  function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  function initStars() {
    stars = Array.from({ length: 180 }, () => ({
      x: Math.random() * canvas.width, y: Math.random() * canvas.height,
      r: Math.random() * 1.2 + .2, o: Math.random(), s: Math.random() * .004 + .002
    }));
  }
  function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(st => {
      st.o += st.s;
      if (st.o > 1 || st.o < 0) st.s *= -1;
      ctx.beginPath(); ctx.arc(st.x, st.y, st.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(180,220,255,${st.o})`; ctx.fill();
    });
    requestAnimationFrame(drawStars);
  }
  resizeCanvas(); initStars(); drawStars();
  window.addEventListener('resize', () => { resizeCanvas(); initStars(); });

  /* PRE-FILL EMAIL FROM URL */
  const params = new URLSearchParams(window.location.search);
  const emailFromUrl = params.get('email');
  if (emailFromUrl) {
    document.getElementById('emailInput').value = emailFromUrl;
    document.getElementById('emailDisplay').textContent = emailFromUrl;
  }

  /* OTP BOX NAVIGATION */
  const boxes = ['o1','o2','o3','o4','o5','o6'].map(id => document.getElementById(id));

  boxes.forEach((box, i) => {
    box.addEventListener('input', () => {
      box.value = box.value.replace(/\D/g, '');
      if (box.value) {
        box.classList.add('filled');
        if (i < 5) boxes[i + 1].focus();
      } else {
        box.classList.remove('filled');
      }
      clearError();
    });

    box.addEventListener('keydown', e => {
      if (e.key === 'Backspace' && !box.value && i > 0) {
        boxes[i - 1].focus();
        boxes[i - 1].value = '';
        boxes[i - 1].classList.remove('filled');
      }
    });

    box.addEventListener('paste', e => {
      e.preventDefault();
      const pasted = e.clipboardData.getData('text').replace(/\D/g, '').slice(0, 6);
      pasted.split('').forEach((char, idx) => {
        if (boxes[idx]) { boxes[idx].value = char; boxes[idx].classList.add('filled'); }
      });
      const nextEmpty = boxes.findIndex(b => !b.value);
      if (nextEmpty !== -1) boxes[nextEmpty].focus(); else boxes[5].focus();
    });
  });

  function getOTP() { return boxes.map(b => b.value).join(''); }

  function shakeBoxes() {
    boxes.forEach(b => {
      b.classList.add('error-box');
      setTimeout(() => b.classList.remove('error-box'), 400);
    });
  }

  function clearError() { document.getElementById('errorMsg').textContent = ''; }

  /* COUNTDOWN — 10 minutes */
  let secondsLeft = 600;
  let timerInterval = setInterval(() => {
    secondsLeft--;
    const m = String(Math.floor(secondsLeft / 60)).padStart(2, '0');
    const s = String(secondsLeft % 60).padStart(2, '0');
    document.getElementById('timerCount').textContent = `${m}:${s}`;
    if (secondsLeft <= 60) document.getElementById('timerDisplay').classList.add('expiring');
    if (secondsLeft <= 0) {
      clearInterval(timerInterval);
      document.getElementById('timerCount').textContent = 'EXPIRED';
      document.getElementById('resendBtn').disabled = false;
      document.getElementById('submitBtn').disabled = true;
      document.getElementById('errorMsg').textContent = '[ EXPIRED ] Code has expired. Request a new one.';
    }
  }, 1000);

  /* TOAST */
  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = `toast ${type} show`;
    setTimeout(() => { t.className = 'toast'; }, 3500);
  }

  /* SUBMIT */
  document.getElementById('submitBtn').addEventListener('click', async () => {
    const email = document.getElementById('emailInput').value.trim();
    const otp   = getOTP();

    if (!email) {
      document.getElementById('errorMsg').textContent = '[ ERROR ] Email address is required.';
      return;
    }
    if (otp.length < 6) {
      document.getElementById('errorMsg').textContent = '[ ERROR ] Enter all 6 digits.';
      shakeBoxes(); return;
    }

    const btn     = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');
    btn.disabled  = true;
    btnText.textContent = 'VERIFYING···';

    try {
      const response = await fetch('http://localhost:8000/auth/verify-otp', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, otp })
      });

      const data = await response.json();

      if (!response.ok) {
        shakeBoxes();
        document.getElementById('errorMsg').textContent = `[ DENIED ] ${data.detail}`;
        btn.disabled = false;
        btnText.textContent = 'VERIFY IDENTITY';
        return;
      }

      clearInterval(timerInterval);
      showToast('[ AUTHORIZED ] Identity confirmed. Redirecting…');
      setTimeout(() => window.location.href = 'login.html', 2000);

    } catch (err) {
      console.error('Verify error:', err);
      document.getElementById('errorMsg').textContent = `[ ERROR ] ${err.message || 'Could not reach auth server.'}`;
      btn.disabled = false;
      btnText.textContent = 'VERIFY IDENTITY';
    }
  });

  boxes[0].focus();
</script>
</body>
</html>
