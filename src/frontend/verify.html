<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lumi — Verify Your Account</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;1,400&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --cream:#fdf8f2;--warm:#f5ede0;--peach:#f4a87c;--coral:#e8725a;
      --plum:#3d2a4e;--grape:#6b4c8a;--lavender:#c4aee0;--mint:#7ecfb3;
      --text:#2d1f3d;--text-mid:#7a6690;--text-dim:#b8a8cc;
      --ff-head:'Fraunces',serif;--ff-body:'Nunito',sans-serif;
    }
    body{background:var(--cream);color:var(--text);font-family:var(--ff-body);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .blob-bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
    .blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.12;animation:blobFloat 12s ease-in-out infinite}
    .blob-1{width:500px;height:500px;background:var(--mint);top:-150px;right:-100px}
    .blob-2{width:400px;height:400px;background:var(--peach);bottom:-100px;left:-100px;animation-delay:-6s}
    @keyframes blobFloat{0%,100%{transform:translate(0,0)}50%{transform:translate(20px,-15px)}}

    .card{position:relative;z-index:1;width:100%;max-width:440px;background:#fff;border-radius:28px;box-shadow:0 20px 60px rgba(61,42,78,.1);padding:48px 40px;text-align:center;animation:fadeUp .5s ease both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

    .card-logo{font-family:var(--ff-head);font-size:22px;font-weight:700;color:var(--plum);margin-bottom:28px;display:block}
    .card-logo span{color:var(--coral)}

    .icon-wrap{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--peach),var(--coral));display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 24px}
    .card h2{font-family:var(--ff-head);font-size:26px;font-weight:700;color:var(--plum);margin-bottom:10px}
    .card .sub{font-size:14px;color:var(--text-mid);line-height:1.6;margin-bottom:8px}
    .email-highlight{font-weight:800;color:var(--plum)}

    .email-input-wrap{margin:20px 0 28px;text-align:left}
    .email-input-wrap label{font-size:13px;font-weight:700;color:var(--text-mid);display:block;margin-bottom:6px}
    .email-input-wrap input{width:100%;padding:12px 16px;border-radius:12px;border:2px solid rgba(61,42,78,.1);background:var(--cream);color:var(--text);font-family:var(--ff-body);font-size:15px;outline:none;transition:border-color .2s}
    .email-input-wrap input:focus{border-color:var(--grape);background:#fff}

    .otp-label{font-size:13px;font-weight:700;color:var(--text-mid);margin-bottom:12px}
    .otp-boxes{display:flex;gap:10px;justify-content:center;margin-bottom:8px}
    .otp-box{width:52px;height:64px;border:none;border-bottom:3px solid rgba(61,42,78,.15);background:transparent;color:var(--plum);font-family:var(--ff-head);font-size:28px;font-weight:700;text-align:center;outline:none;transition:border-color .2s;caret-color:transparent}
    .otp-box:focus{border-bottom-color:var(--grape)}
    .otp-box.filled{border-bottom-color:var(--coral);color:var(--coral)}
    .otp-box.error-box{border-bottom-color:var(--coral);animation:shake .3s ease}
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

    .timer-row{display:flex;align-items:center;justify-content:space-between;margin:12px 0 24px;font-size:13px}
    .timer{color:var(--text-mid)}
    .timer strong{color:var(--grape);font-weight:800}
    .timer.expiring strong{color:var(--coral)}
    .resend-btn{background:none;border:none;color:var(--coral);font-family:var(--ff-body);font-size:13px;font-weight:700;cursor:pointer;transition:opacity .2s}
    .resend-btn:disabled{opacity:.4;cursor:not-allowed}

    .error-msg{font-size:13px;color:var(--coral);font-weight:600;min-height:18px;margin-bottom:12px}

    .btn-submit{width:100%;padding:14px;border-radius:12px;background:var(--coral);color:#fff;font-family:var(--ff-body);font-size:16px;font-weight:800;border:none;cursor:pointer;transition:transform .2s,box-shadow .2s;box-shadow:0 6px 20px rgba(232,114,90,.3);margin-bottom:16px}
    .btn-submit:hover{transform:translateY(-1px);box-shadow:0 10px 28px rgba(232,114,90,.4)}
    .btn-submit:disabled{opacity:.5;cursor:not-allowed;transform:none}
    .login-link{font-size:13px;color:var(--text-mid)}
    .login-link a{color:var(--coral);font-weight:700;text-decoration:none}

    .toast{position:fixed;bottom:28px;right:28px;padding:14px 20px;border-radius:12px;font-size:14px;font-weight:600;opacity:0;transform:translateY(8px);transition:all .3s;z-index:200;pointer-events:none}
    .toast.success{background:var(--mint);color:#1a5c45}
    .toast.error{background:#fde8e4;color:var(--coral)}
    .toast.show{opacity:1;transform:translateY(0)}
  </style>
</head>
<body>
<div class="blob-bg"><div class="blob blob-1"></div><div class="blob blob-2"></div></div>

<div class="card">
  <span class="card-logo">Lumi<span>.</span></span>
  <div class="icon-wrap">📬</div>
  <h2>Check your inbox</h2>
  <p class="sub">We sent a 6-digit code to<br/><span class="email-highlight" id="emailDisplay">your email</span></p>

  <div class="email-input-wrap">
    <label for="emailInput">Email address</label>
    <input type="email" id="emailInput" placeholder="you@example.com"/>
  </div>

  <div class="otp-label">Enter your verification code</div>
  <div class="otp-boxes">
    <input class="otp-box" type="text" maxlength="1" inputmode="numeric" id="o1"/>
    <input class="otp-box" type="text" maxlength="1" inputmode="numeric" id="o2"/>
    <input class="otp-box" type="text" maxlength="1" inputmode="numeric" id="o3"/>
    <input class="otp-box" type="text" maxlength="1" inputmode="numeric" id="o4"/>
    <input class="otp-box" type="text" maxlength="1" inputmode="numeric" id="o5"/>
    <input class="otp-box" type="text" maxlength="1" inputmode="numeric" id="o6"/>
  </div>

  <div class="timer-row">
    <div class="timer" id="timerDisplay">Expires in <strong id="timerCount">10:00</strong></div>
    <button class="resend-btn" id="resendBtn" disabled>Resend code</button>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <button class="btn-submit" id="submitBtn">
    <span id="btnText">Verify my account</span>
  </button>
  <div class="login-link">Wrong account? <a href="login.html">Sign in instead</a></div>
</div>

<div class="toast" id="toast"></div>

<script>
  const params = new URLSearchParams(window.location.search);
  const emailFromUrl = params.get('email');
  if(emailFromUrl){
    document.getElementById('emailInput').value = emailFromUrl;
    document.getElementById('emailDisplay').textContent = emailFromUrl;
  }

  const boxes = ['o1','o2','o3','o4','o5','o6'].map(id => document.getElementById(id));
  boxes.forEach((box,i) => {
    box.addEventListener('input', () => {
      box.value = box.value.replace(/\D/g,'');
      if(box.value){ box.classList.add('filled'); if(i<5) boxes[i+1].focus(); }
      else box.classList.remove('filled');
      document.getElementById('errorMsg').textContent = '';
    });
    box.addEventListener('keydown', e => {
      if(e.key==='Backspace'&&!box.value&&i>0){ boxes[i-1].focus(); boxes[i-1].value=''; boxes[i-1].classList.remove('filled'); }
    });
    box.addEventListener('paste', e => {
      e.preventDefault();
      const p = e.clipboardData.getData('text').replace(/\D/g,'').slice(0,6);
      p.split('').forEach((c,idx) => { if(boxes[idx]){boxes[idx].value=c;boxes[idx].classList.add('filled');} });
      const next = boxes.findIndex(b=>!b.value);
      if(next!==-1) boxes[next].focus(); else boxes[5].focus();
    });
  });

  function getOTP(){ return boxes.map(b=>b.value).join(''); }
  function shakeBoxes(){ boxes.forEach(b=>{ b.classList.add('error-box'); setTimeout(()=>b.classList.remove('error-box'),400); }); }

  let secondsLeft = 600;
  let timerInterval = setInterval(() => {
    secondsLeft--;
    const m = String(Math.floor(secondsLeft/60)).padStart(2,'0');
    const s = String(secondsLeft%60).padStart(2,'0');
    document.getElementById('timerCount').textContent = `${m}:${s}`;
    if(secondsLeft<=60) document.getElementById('timerDisplay').classList.add('expiring');
    if(secondsLeft<=0){
      clearInterval(timerInterval);
      document.getElementById('timerCount').textContent = 'Expired';
      document.getElementById('resendBtn').disabled = false;
      document.getElementById('submitBtn').disabled = true;
      document.getElementById('errorMsg').textContent = 'Code expired. Request a new one.';
    }
  },1000);

  function showToast(msg,type='success'){
    const t=document.getElementById('toast'); t.textContent=msg; t.className=`toast ${type} show`;
    setTimeout(()=>t.className='toast',3500);
  }

  document.getElementById('submitBtn').addEventListener('click', async () => {
    const email = document.getElementById('emailInput').value.trim();
    const otp = getOTP();
    if(!email){ document.getElementById('errorMsg').textContent='Please enter your email.'; return; }
    if(otp.length<6){ document.getElementById('errorMsg').textContent='Please enter all 6 digits.'; shakeBoxes(); return; }

    const btn=document.getElementById('submitBtn'); const btnText=document.getElementById('btnText');
    btn.disabled=true; btnText.textContent='Verifying...';

    try{
      const res = await fetch('https://lumi-conversation-ai.onrender.com/auth/verify-otp',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,otp})});
      const data = await res.json();
      if(!res.ok){ shakeBoxes(); document.getElementById('errorMsg').textContent=data.detail||'Invalid code.'; btn.disabled=false; btnText.textContent='Verify my account'; return; }
      clearInterval(timerInterval);
      showToast('Account verified! Welcome to Lumi 🎉');
      setTimeout(()=>window.location.href='login.html',2000);
    } catch(err){
      document.getElementById('errorMsg').textContent='Could not reach server. Try again.';
      btn.disabled=false; btnText.textContent='Verify my account';
    }
  });

  document.getElementById('resendBtn').addEventListener('click', async () => {
    const email = document.getElementById('emailInput').value.trim();
    if(!email){ document.getElementById('errorMsg').textContent='Please enter your email.'; return; }
    const btn=document.getElementById('resendBtn'); btn.disabled=true; btn.textContent='Sending...';
    try{
      const res = await fetch('https://lumi-conversation-ai.onrender.com/auth/resend-otp',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email})});
      const data = await res.json();
      if(!res.ok){ document.getElementById('errorMsg').textContent=data.detail; btn.disabled=false; btn.textContent='Resend code'; return; }
      secondsLeft=600; document.getElementById('timerDisplay').classList.remove('expiring');
      document.getElementById('timerCount').textContent='10:00'; document.getElementById('submitBtn').disabled=false;
      document.getElementById('btnText').textContent='Verify my account'; document.getElementById('errorMsg').textContent='';
      boxes.forEach(b=>{b.value='';b.classList.remove('filled');}); boxes[0].focus();
      showToast('New code sent! Check your email.');
      let cd=60; const cdi=setInterval(()=>{ cd--; btn.textContent=`Resend (${cd}s)`; if(cd<=0){clearInterval(cdi);btn.textContent='Resend code';btn.disabled=false;} },1000);
    } catch(err){ document.getElementById('errorMsg').textContent='Could not reach server.'; btn.disabled=false; btn.textContent='Resend code'; }
  });

  boxes[0].focus();
</script>
</body>
</html>
