<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lumi — Create Account</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --cream:#fdf8f2;--warm:#f5ede0;--peach:#f4a87c;--coral:#e8725a;
      --plum:#3d2a4e;--grape:#6b4c8a;--lavender:#c4aee0;--mint:#7ecfb3;
      --text:#2d1f3d;--text-mid:#7a6690;--text-dim:#b8a8cc;
      --ff-head:'Fraunces',serif;--ff-body:'Nunito',sans-serif;
    }
    body{background:var(--cream);color:var(--text);font-family:var(--ff-body);min-height:100vh;display:flex;align-items:stretch}

    .blob-bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
    .blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.12;animation:blobFloat 12s ease-in-out infinite}
    .blob-1{width:500px;height:500px;background:var(--peach);top:-150px;left:-100px}
    .blob-2{width:400px;height:400px;background:var(--lavender);bottom:-100px;right:-100px;animation-delay:-6s}
    @keyframes blobFloat{0%,100%{transform:translate(0,0)}50%{transform:translate(20px,-15px)}}

    /* LEFT PANEL */
    .left-panel{
      position:relative;z-index:1;
      width:420px;flex-shrink:0;
      background:var(--plum);
      display:flex;flex-direction:column;justify-content:center;
      padding:60px 48px;
      overflow:hidden;
    }
    .left-panel::before{
      content:'';position:absolute;
      width:400px;height:400px;border-radius:50%;
      background:rgba(255,255,255,.04);
      top:-100px;right:-150px;
    }
    .left-panel::after{
      content:'';position:absolute;
      width:300px;height:300px;border-radius:50%;
      background:rgba(255,255,255,.04);
      bottom:-80px;left:-100px;
    }
    .lp-logo{font-family:var(--ff-head);font-size:28px;font-weight:700;color:#fff;margin-bottom:48px}
    .lp-logo span{color:var(--peach)}
    .lp-title{font-family:var(--ff-head);font-size:36px;font-weight:700;color:#fff;line-height:1.2;margin-bottom:16px}
    .lp-title em{font-style:italic;color:var(--peach)}
    .lp-desc{font-size:15px;color:rgba(255,255,255,.6);line-height:1.7;margin-bottom:40px}
    .lp-features{display:flex;flex-direction:column;gap:16px}
    .lp-feature{display:flex;align-items:center;gap:12px}
    .lp-feature .icon{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
    .lp-feature p{font-size:14px;color:rgba(255,255,255,.7)}

    /* RIGHT PANEL */
    .right-panel{
      position:relative;z-index:1;
      flex:1;display:flex;align-items:center;justify-content:center;
      padding:40px 24px;
    }
    .form-card{width:100%;max-width:440px}
    .form-card h2{font-family:var(--ff-head);font-size:28px;font-weight:700;color:var(--plum);margin-bottom:8px}
    .form-card .sub{font-size:15px;color:var(--text-mid);margin-bottom:32px}
    .form-card .sub a{color:var(--coral);font-weight:700;text-decoration:none}

    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:18px}
    .form-group label{font-size:13px;font-weight:700;color:var(--text-mid)}
    .form-group input{
      padding:12px 16px;border-radius:12px;
      border:2px solid rgba(61,42,78,.1);
      background:#fff;color:var(--text);
      font-family:var(--ff-body);font-size:15px;
      outline:none;transition:border-color .2s,box-shadow .2s;
    }
    .form-group input::placeholder{color:var(--text-dim)}
    .form-group input:focus{border-color:var(--grape);box-shadow:0 0 0 4px rgba(107,76,138,.1)}
    .form-group input.error{border-color:var(--coral)}

    /* PASSWORD STRENGTH */
    .strength-bars{display:flex;gap:4px;margin-top:6px}
    .strength-bars span{flex:1;height:3px;border-radius:4px;background:rgba(61,42,78,.1);transition:background .3s}
    .strength-label{font-size:11px;color:var(--text-dim);margin-top:4px}

    /* TERMS */
    .terms-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:24px}
    .terms-row input[type=checkbox]{width:18px;height:18px;flex-shrink:0;margin-top:2px;accent-color:var(--grape);cursor:pointer}
    .terms-row label{font-size:13px;color:var(--text-mid);line-height:1.5;cursor:pointer}
    .terms-row label a{color:var(--coral);font-weight:700;text-decoration:none}

    .btn-submit{
      width:100%;padding:14px;border-radius:12px;
      background:var(--coral);color:#fff;
      font-family:var(--ff-body);font-size:16px;font-weight:800;
      border:none;cursor:pointer;
      transition:transform .2s,box-shadow .2s;
      box-shadow:0 6px 20px rgba(232,114,90,.3);
    }
    .btn-submit:hover{transform:translateY(-1px);box-shadow:0 10px 28px rgba(232,114,90,.4)}
    .btn-submit:disabled{opacity:.5;cursor:not-allowed;transform:none}

    .divider{display:flex;align-items:center;gap:12px;margin:20px 0}
    .divider hr{flex:1;border:none;border-top:1px solid rgba(61,42,78,.1)}
    .divider span{font-size:13px;color:var(--text-dim)}

    .toast{position:fixed;bottom:28px;right:28px;padding:14px 20px;border-radius:12px;font-size:14px;font-weight:600;opacity:0;transform:translateY(8px);transition:all .3s;z-index:200;pointer-events:none;max-width:320px}
    .toast.success{background:var(--mint);color:#1a5c45}
    .toast.error{background:#fde8e4;color:var(--coral)}
    .toast.show{opacity:1;transform:translateY(0)}

    @media(max-width:900px){.left-panel{display:none} .right-panel{padding:60px 24px}}
  </style>
</head>
<body>
<div class="blob-bg"><div class="blob blob-1"></div><div class="blob blob-2"></div></div>

<!-- LEFT -->
<div class="left-panel">
  <div class="lp-logo">Lumi<span>.</span></div>
  <div class="lp-title">Join the <em>conversation</em></div>
  <p class="lp-desc">Create your account and start chatting with Lumi — your AI companion who listens, learns, and actually cares.</p>
  <div class="lp-features">
    <div class="lp-feature"><div class="icon">💬</div><p>Real, meaningful conversations</p></div>
    <div class="lp-feature"><div class="icon">🔒</div><p>Your data is private, always</p></div>
    <div class="lp-feature"><div class="icon">✨</div><p>Free to start, no credit card</p></div>
  </div>
</div>

<!-- RIGHT -->
<div class="right-panel">
  <div class="form-card">
    <h2>Create your account</h2>
    <p class="sub">Already have one? <a href="login.html">Sign in instead</a></p>

    <form id="registerForm" novalidate>
      <div class="form-row">
        <div class="form-group">
          <label for="firstName">First name</label>
          <input type="text" id="firstName" placeholder="e.g. Amara" required/>
        </div>
        <div class="form-group">
          <label for="lastName">Last name</label>
          <input type="text" id="lastName" placeholder="e.g. Okafor" required/>
        </div>
      </div>

      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="e.g. amara_ok" required/>
      </div>

      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@example.com" required/>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="At least 8 characters" required/>
        <div class="strength-bars">
          <span id="s1"></span><span id="s2"></span><span id="s3"></span><span id="s4"></span>
        </div>
        <div class="strength-label" id="strengthLabel"></div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm password</label>
        <input type="password" id="confirmPassword" placeholder="Same password again" required/>
      </div>

      <div class="terms-row">
        <input type="checkbox" id="terms" required/>
        <label for="terms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
      </div>

      <button class="btn-submit" id="submitBtn" type="submit">
        <span id="btnText">Create my account</span>
      </button>
    </form>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  /* PASSWORD STRENGTH */
  const bars = ['s1','s2','s3','s4'].map(id => document.getElementById(id));
  const colors = ['#e8725a','#f4a87c','#89c4e1','#7ecfb3'];
  const labels = ['Too weak','Getting there','Strong','Very strong'];
  document.getElementById('password').addEventListener('input', function(){
    const v = this.value; let score = 0;
    if(v.length >= 8) score++;
    if(/[A-Z]/.test(v)) score++;
    if(/[0-9]/.test(v)) score++;
    if(/[^A-Za-z0-9]/.test(v)) score++;
    bars.forEach((b,i) => b.style.background = i < score ? colors[score-1] : 'rgba(61,42,78,.1)');
    const lbl = document.getElementById('strengthLabel');
    lbl.textContent = v.length ? labels[score-1] || 'Too weak' : '';
    lbl.style.color = score > 0 ? colors[score-1] : 'var(--text-dim)';
  });

  function showToast(msg, type='success'){
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = `toast ${type} show`;
    setTimeout(() => t.className = 'toast', 3500);
  }

  document.getElementById('registerForm').addEventListener('submit', async function(e){
    e.preventDefault();
    const firstName = document.getElementById('firstName').value.trim();
    const lastName = document.getElementById('lastName').value.trim();
    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const terms = document.getElementById('terms').checked;

    if(!firstName||!lastName||!username||!email||!password) return showToast('Please fill in all fields.','error');
    if(password !== confirmPassword) return showToast('Passwords don\'t match.','error');
    if(!terms) return showToast('Please accept the terms to continue.','error');

    const btn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');
    btn.disabled = true; btnText.textContent = 'Creating your account...';

    try{
      const res = await fetch('/auth/CreateUser',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body: JSON.stringify({first_name:firstName,last_name:lastName,username,email,password})
      });
      
      let data = {};
      const contentType = res.headers.get("content-type");
      if (contentType && contentType.includes("application/json")) {
        data = await res.json();
      }

      if(!res.ok) throw new Error(data.detail||'Registration failed.');
      showToast('Account created! Check your email for the verification code. 🎉');
      setTimeout(() => window.location.href = `verify.html?email=${encodeURIComponent(email)}`, 2000);
    } catch(err){
      showToast(err.message,'error');
      btn.disabled = false; btnText.textContent = 'Create my account';
    }
  });
</script>
</body>
</html>
