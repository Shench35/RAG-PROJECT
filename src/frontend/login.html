<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ORBITAL — Access Terminal</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #050810;
      --surface:   #0a0f1e;
      --panel:     #0d1526;
      --border:    #1a2a4a;
      --accent:    #00d4ff;
      --accent2:   #ff4500;
      --green:     #00ff88;
      --muted:     #3a5070;
      --text:      #c8dff0;
      --text-dim:  #5a7a9a;
      --font-mono: 'Share Tech Mono', monospace;
      --font-head: 'Orbitron', sans-serif;
      --font-body: 'Exo 2', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    canvas#stars {
      position: fixed; inset: 0;
      z-index: 0; pointer-events: none;
    }

    .grid-overlay {
      position: fixed; inset: 0; z-index: 1;
      background-image:
        linear-gradient(rgba(0,212,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .scanline {
      position: fixed; top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: .25; z-index: 2;
      animation: scan 6s linear infinite;
    }
    @keyframes scan { 0% { top: 0; } 100% { top: 100vh; } }

    /* EARTH glow bottom left */
    .earth-glow {
      position: fixed;
      bottom: -200px; left: -200px;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,80,180,.15) 0%, transparent 70%);
      z-index: 1;
      pointer-events: none;
      animation: earthPulse 8s ease-in-out infinite;
    }
    @keyframes earthPulse {
      0%,100% { transform: scale(1); opacity: .6; }
      50%      { transform: scale(1.08); opacity: 1; }
    }

    /* WRAPPER */
    .wrapper {
      position: relative; z-index: 10;
      display: flex;
      width: min(760px, 95vw);
      animation: fadeUp .8s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* LEFT ACCENT STRIP */
    .accent-strip {
      width: 6px;
      background: linear-gradient(to bottom, var(--accent), transparent 60%);
      flex-shrink: 0;
    }

    /* MAIN PANEL */
    .main-panel {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: none;
      position: relative;
      clip-path: polygon(0 0, calc(100% - 28px) 0, 100% 28px, 100% 100%, 28px 100%, 0 calc(100% - 28px));
    }

    /* top bar */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 32px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }
    .top-bar .brand {
      font-family: var(--font-head);
      font-size: 14px;
      font-weight: 900;
      color: #fff;
      letter-spacing: 2px;
    }
    .top-bar .brand span { color: var(--accent); }
    .top-bar .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--green);
      letter-spacing: 2px;
    }
    .top-bar .status-pill::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: blink 1.5s ease-in-out infinite;
    }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: .3; } }

    /* BODY */
    .panel-body {
      padding: 48px 48px 40px;
    }

    .panel-header { margin-bottom: 40px; }
    .panel-header .eyebrow {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--accent);
      letter-spacing: 4px;
      margin-bottom: 8px;
    }
    .panel-header h1 {
      font-family: var(--font-head);
      font-size: 28px;
      font-weight: 900;
      color: #fff;
      line-height: 1;
    }
    .panel-header p {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 8px;
    }

    /* FORM */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 7px;
      margin-bottom: 20px;
    }

    label {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 3px;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .input-wrap { position: relative; }
    .input-wrap .icon {
      position: absolute;
      left: 14px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 13px;
      pointer-events: none;
      transition: color .2s;
      font-family: var(--font-mono);
    }
    .input-wrap input {
      width: 100%;
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
      padding: 13px 44px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      letter-spacing: 1px;
    }
    .input-wrap input::placeholder { color: var(--muted); letter-spacing: 0; }
    .input-wrap input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent), inset 0 0 16px rgba(0,212,255,.05);
    }
    .input-wrap input:focus + .icon,
    .input-wrap:focus-within .icon { color: var(--accent); }

    /* toggle password */
    .toggle-pw {
      position: absolute;
      right: 14px; top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 1px;
      cursor: pointer;
      padding: 4px;
      transition: color .2s;
    }
    .toggle-pw:hover { color: var(--accent); }

    /* row extras */
    .extras-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
      margin-top: -8px;
    }
    .remember-row {
      display: flex; align-items: center; gap: 8px;
    }
    .remember-row input[type=checkbox] {
      width: 13px; height: 13px;
      accent-color: var(--accent);
      cursor: pointer;
    }
    .remember-row label {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 1px;
      text-transform: none;
      cursor: pointer;
    }
    .forgot-link {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: 1px;
      transition: opacity .2s;
    }
    .forgot-link:hover { opacity: .7; }

    /* BUTTON */
    .btn-launch {
      width: 100%;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: var(--font-head);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 4px;
      padding: 16px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      text-transform: uppercase;
      transition: color .3s;
      clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 14px 100%, 0 calc(100% - 14px));
      margin-bottom: 24px;
    }
    .btn-launch::before {
      content: '';
      position: absolute; inset: 0;
      background: var(--accent);
      transform: translateX(-101%);
      transition: transform .35s ease;
      z-index: 0;
    }
    .btn-launch:hover::before { transform: translateX(0); }
    .btn-launch:hover { color: var(--bg); }
    .btn-launch span { position: relative; z-index: 1; }
    .btn-launch:disabled { opacity: .4; cursor: not-allowed; }

    /* DIVIDER */
    .divider-row {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 24px;
    }
    .divider-row hr {
      flex: 1; border: none;
      border-top: 1px solid var(--border);
    }
    .divider-row span {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 2px;
      white-space: nowrap;
    }

    /* SIGNUP LINK */
    .signup-row {
      text-align: center;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-dim);
    }
    .signup-row a { color: var(--accent); text-decoration: none; }

    /* CORNER DECORATIONS */
    .main-panel::before, .main-panel::after {
      content: ''; position: absolute;
      width: 18px; height: 18px;
    }
    .main-panel::before {
      top: 50px; right: 7px;
      border-top: 1px solid var(--accent);
      border-right: 1px solid var(--accent);
    }
    .main-panel::after {
      bottom: 7px; left: 7px;
      border-bottom: 1px solid var(--accent);
      border-left: 1px solid var(--accent);
    }

    /* ATTEMPT COUNTER */
    .attempt-info {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 20px;
    }
    .attempt-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      transition: background .3s;
    }
    .attempt-dot.used { background: var(--accent2); }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 32px; right: 32px;
      padding: 14px 20px;
      font-family: var(--font-mono);
      font-size: 11px;
      border-left: 3px solid var(--green);
      background: var(--panel);
      color: var(--green);
      opacity: 0;
      transform: translateY(10px);
      transition: opacity .3s, transform .3s;
      z-index: 100;
      pointer-events: none;
      max-width: 320px;
    }
    .toast.error { border-color: var(--accent2); color: var(--accent2); }
    .toast.show  { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>

<canvas id="stars"></canvas>
<div class="grid-overlay"></div>
<div class="scanline"></div>
<div class="earth-glow"></div>

<div class="wrapper">
  <div class="accent-strip"></div>

  <div class="main-panel">
    <!-- TOP BAR -->
    <div class="top-bar">
      <div class="brand">ORBI<span>TAL</span></div>
      <div class="status-pill">SYSTEMS ONLINE</div>
    </div>

    <!-- BODY -->
    <div class="panel-body">
      <div class="panel-header">
        <div class="eyebrow">// Access Terminal</div>
        <h1>CREW LOGIN</h1>
        <p>Authenticate to access mission control systems.</p>
      </div>

      <form id="loginForm" novalidate>

        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-wrap">
            <span class="icon">@</span>
            <input type="email" id="email" placeholder="crew@orbital.space" required />
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrap">
            <span class="icon">⬡</span>
            <input type="password" id="password" placeholder="Enter access code" required />
            <button type="button" class="toggle-pw" id="togglePw">SHOW</button>
          </div>
        </div>

        <div class="extras-row">
          <div class="remember-row">
            <input type="checkbox" id="remember" />
            <label for="remember">Remember terminal</label>
          </div>
          <a href="#" class="forgot-link">FORGOT CODE?</a>
        </div>

        <!-- attempt indicators -->
        <div class="attempt-info">
          <div class="attempt-dot" id="d1"></div>
          <div class="attempt-dot" id="d2"></div>
          <div class="attempt-dot" id="d3"></div>
        </div>

        <button class="btn-launch" id="submitBtn" type="submit">
          <span id="btnText">AUTHENTICATE</span>
        </button>

        <div class="divider-row">
          <hr /><span>NO ACCOUNT?</span><hr />
        </div>

        <div class="signup-row">
          New to Orbital? <a href="create_acc.html">Register personnel →</a>
        </div>

      </form>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  /* STARFIELD */
  const canvas = document.getElementById('stars');
  const ctx    = canvas.getContext('2d');
  let stars    = [];

  function resizeCanvas() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  function initStars() {
    stars = Array.from({ length: 200 }, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.3 + .2,
      o: Math.random(),
      s: Math.random() * .004 + .002
    }));
  }
  function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(st => {
      st.o += st.s;
      if (st.o > 1 || st.o < 0) st.s *= -1;
      ctx.beginPath();
      ctx.arc(st.x, st.y, st.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(180,220,255,${st.o})`;
      ctx.fill();
    });
    requestAnimationFrame(drawStars);
  }
  resizeCanvas(); initStars(); drawStars();
  window.addEventListener('resize', () => { resizeCanvas(); initStars(); });

  /* TOGGLE PASSWORD */
  const pwInput  = document.getElementById('password');
  const togglePw = document.getElementById('togglePw');
  togglePw.addEventListener('click', () => {
    const show = pwInput.type === 'password';
    pwInput.type       = show ? 'text' : 'password';
    togglePw.textContent = show ? 'HIDE' : 'SHOW';
  });

  /* TOAST */
  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className   = `toast ${type} show`;
    setTimeout(() => { t.className = 'toast'; }, 3500);
  }

  /* ATTEMPT TRACKER */
  let attempts = 0;
  const dots   = ['d1','d2','d3'].map(id => document.getElementById(id));
  function markAttempt() {
    if (attempts < 3) {
      dots[attempts].classList.add('used');
      attempts++;
    }
    if (attempts >= 3) {
      showToast('[ LOCKOUT ] Max attempts reached. Contact admin.', 'error');
      document.getElementById('submitBtn').disabled = true;
    }
  }

  /* FORM SUBMIT */
  document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) {
      return showToast('[ ERROR ] Email and password required.', 'error');
    }

    const btn     = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');
    btn.disabled  = true;
    btnText.textContent = 'AUTHENTICATING···';

    try {
      const response = await fetch('http://localhost:8000/auth/login', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      const data = await response.json();

      if (!response.ok) {
        markAttempt();
        throw new Error(data.detail || 'Authentication failed.');
      }

      // store token if returned
      localStorage.setItem('access_token', data.access_token);
      localStorage.setItem('refresh_token', data.refresh_token);
      localStorage.setItem('user', JSON.stringify(data.user));

      showToast('[ AUTHORIZED ] Access granted. Launching…');
      setTimeout(() => window.location.href = 'index.html', 2000);

    } catch (err) {
      showToast(`[ DENIED ] ${err.message}`, 'error');
      btn.disabled = false;
      btnText.textContent = 'AUTHENTICATE';
    }
  });
</script>
</body>
</html>
