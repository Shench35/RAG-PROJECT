<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lumi — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --cream:#fdf8f2;--warm:#f5ede0;--peach:#f4a87c;--coral:#e8725a;
      --plum:#3d2a4e;--grape:#6b4c8a;--lavender:#c4aee0;--mint:#7ecfb3;
      --text:#2d1f3d;--text-mid:#7a6690;--text-dim:#b8a8cc;
      --ff-head:'Fraunces',serif;--ff-body:'Nunito',sans-serif;
    }
    body{background:var(--cream);color:var(--text);font-family:var(--ff-body);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .blob-bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
    .blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.12;animation:blobFloat 12s ease-in-out infinite}
    .blob-1{width:500px;height:500px;background:var(--peach);top:-150px;left:-100px}
    .blob-2{width:400px;height:400px;background:var(--lavender);bottom:-100px;right:-100px;animation-delay:-6s}
    @keyframes blobFloat{0%,100%{transform:translate(0,0)}50%{transform:translate(20px,-15px)}}

    .card{
      position:relative;z-index:1;
      width:100%;max-width:460px;
      background:#fff;border-radius:28px;
      box-shadow:0 20px 60px rgba(61,42,78,.1);
      padding:48px 44px;
      animation:fadeUp .5s ease both;
    }
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

    .card-logo{font-family:var(--ff-head);font-size:24px;font-weight:700;color:var(--plum);margin-bottom:32px;display:block}
    .card-logo span{color:var(--coral)}
    .card h2{font-family:var(--ff-head);font-size:28px;font-weight:700;color:var(--plum);margin-bottom:8px}
    .card .sub{font-size:15px;color:var(--text-mid);margin-bottom:32px}
    .card .sub a{color:var(--coral);font-weight:700;text-decoration:none}

    .form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:18px}
    .form-group label{font-size:13px;font-weight:700;color:var(--text-mid)}
    .input-wrap{position:relative}
    .form-group input{
      width:100%;padding:12px 16px;border-radius:12px;
      border:2px solid rgba(61,42,78,.1);
      background:var(--cream);color:var(--text);
      font-family:var(--ff-body);font-size:15px;
      outline:none;transition:border-color .2s,box-shadow .2s;
    }
    .form-group input::placeholder{color:var(--text-dim)}
    .form-group input:focus{border-color:var(--grape);box-shadow:0 0 0 4px rgba(107,76,138,.1);background:#fff}
    .toggle-pw{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:13px;color:var(--text-dim);font-family:var(--ff-body);font-weight:700;transition:color .2s}
    .toggle-pw:hover{color:var(--plum)}

    .extras{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
    .remember{display:flex;align-items:center;gap:8px;cursor:pointer}
    .remember input{accent-color:var(--grape);cursor:pointer}
    .remember span{font-size:13px;color:var(--text-mid)}
    .forgot{font-size:13px;color:var(--coral);font-weight:700;text-decoration:none}

    .btn-submit{width:100%;padding:14px;border-radius:12px;background:var(--coral);color:#fff;font-family:var(--ff-body);font-size:16px;font-weight:800;border:none;cursor:pointer;transition:transform .2s,box-shadow .2s;box-shadow:0 6px 20px rgba(232,114,90,.3)}
    .btn-submit:hover{transform:translateY(-1px);box-shadow:0 10px 28px rgba(232,114,90,.4)}
    .btn-submit:disabled{opacity:.5;cursor:not-allowed;transform:none}

    .error-msg{font-size:13px;color:var(--coral);min-height:18px;margin-bottom:12px;font-weight:600}

    .toast{position:fixed;bottom:28px;right:28px;padding:14px 20px;border-radius:12px;font-size:14px;font-weight:600;opacity:0;transform:translateY(8px);transition:all .3s;z-index:200;pointer-events:none}
    .toast.success{background:var(--mint);color:#1a5c45}
    .toast.error{background:#fde8e4;color:var(--coral)}
    .toast.show{opacity:1;transform:translateY(0)}

    .back-home{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--text-mid);text-decoration:none;margin-bottom:24px;font-weight:600;transition:color .2s}
    .back-home:hover{color:var(--plum)}
  </style>
</head>
<body>
<div class="blob-bg"><div class="blob blob-1"></div><div class="blob blob-2"></div></div>

<div class="card">
  <a href="index.html" class="back-home">← Back to home</a>
  <span class="card-logo">Lumi<span>.</span></span>
  <h2>Welcome back 👋</h2>
  <p class="sub">Don't have an account? <a href="create_acc.html">Sign up free</a></p>

  <form id="loginForm" novalidate>
    <div class="form-group">
      <label for="email">Email address</label>
      <input type="email" id="email" placeholder="you@example.com" required/>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <div class="input-wrap">
        <input type="password" id="password" placeholder="Your password" required/>
        <button type="button" class="toggle-pw" id="togglePw">Show</button>
      </div>
    </div>

    <div class="extras">
      <label class="remember">
        <input type="checkbox" id="remember"/>
        <span>Remember me</span>
      </label>
      <a href="#" class="forgot">Forgot password?</a>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <button class="btn-submit" id="submitBtn" type="submit">
      <span id="btnText">Sign in to Lumi</span>
    </button>
  </form>
</div>

<div class="toast" id="toast"></div>

<script>
  document.getElementById('togglePw').addEventListener('click', function(){
    const pw = document.getElementById('password');
    const show = pw.type === 'password';
    pw.type = show ? 'text' : 'password';
    this.textContent = show ? 'Hide' : 'Show';
  });

  function showToast(msg, type='success'){
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = `toast ${type} show`;
    setTimeout(() => t.className = 'toast', 3500);
  }

  document.getElementById('loginForm').addEventListener('submit', async function(e){
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    document.getElementById('errorMsg').textContent = '';

    if(!email||!password){
      document.getElementById('errorMsg').textContent = 'Please enter your email and password.';
      return;
    }

    const btn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');
    btn.disabled = true; btnText.textContent = 'Signing you in...';

    try{
      const res = await fetch('https://lumi-conversation-ai.onrender.com/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();
      if(!res.ok) throw new Error(data.detail||'Login failed.');

      localStorage.setItem('access_token', data.access_token);
      localStorage.setItem('refresh_token', data.refresh_token);
      localStorage.setItem('user', JSON.stringify(data.user));

      showToast('Welcome back! 🎉');
      const role = data.user?.role || 'user';
      setTimeout(() => {
        window.location.href = role === 'admin' ? 'admin.html' : 'chat.html';
      }, 1500);
    } catch(err){
      document.getElementById('errorMsg').textContent = err.message;
      btn.disabled = false; btnText.textContent = 'Sign in to Lumi';
    }
  });
</script>
</body>
</html>
